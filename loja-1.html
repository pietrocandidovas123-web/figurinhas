<style>

  .container { padding: 20px 16px; }

  .passo { background: var(--card); border: 1px solid var(--borda); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .passo-titulo { font-size: 0.7rem; font-weight: 700; color: var(--amarelo); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .passo-num { background: var(--amarelo); color: var(--azul); width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }

  label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }

  input[type=text], textarea {
    width: 100%; background: #0d1929; border: 1px solid var(--borda);
    border-radius: 8px; color: var(--texto); font-family: 'Inter', sans-serif;
    font-size: 0.85rem; padding: 12px; outline: none; transition: border-color 0.2s;
  }
  textarea { resize: vertical; min-height: 140px; }
  input[type=text]:focus, textarea:focus { border-color: var(--amarelo); }
  input[type=text]::placeholder, textarea::placeholder { color: var(--muted); }

  .hint { font-size: 0.72rem; color: var(--muted); margin-top: 5px; }

  .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; margin-top: 14px; text-align: center; }

  .btn-whats svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

  .separador { height: 1px; background: var(--borda); margin: 14px 0; }

  .resultado-box { background: var(--card); border: 1px solid var(--borda); border-radius: 10px; padding: 16px; margin-top: 16px; }

  .figurinha-tag { display: inline-block; background: #0a2e1a; border: 1px solid var(--verde); border-radius: 5px; padding: 3px 9px; font-size: 0.8rem; margin: 2px; color: #4ade80; }

  .resumo-preco { background: #0d1929; border-radius: 8px; padding: 12px; margin: 12px 0; }
  .preco-linha { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--muted); padding: 3px 0; }
  .preco-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; color: var(--amarelo); border-top: 1px solid var(--borda); margin-top: 6px; padding-top: 8px; }

  .alerta { padding: 12px 14px; border-radius: 8px; font-size: 0.82rem; margin-top: 12px; }
  .alerta-erro { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }

  .loading { text-align: center; color: var(--muted); padding: 30px; font-size: 0.85rem; }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--borda); border-top-color: var(--amarelo); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

<script>
const BIN_ID = '6a3edee3da38895dfe0485b9';
const API_KEY = '$2a$10$BrOXbFU50a6WqMfNYYRXmeJ1AE2Qe1WUHl.WpZCwPLpBINjCu.TIC';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const DB_HEADERS = { 'Content-Type': 'application/json', 'X-Access-Key': API_KEY };

let estoque = {};
let pedidos = [];

// Carrega estoque na abertura
async function iniciar() {
  try {
    const r = await fetch(BIN_URL + '/latest', { headers: DB_HEADERS });
    const data = await r.json();
    estoque = data.record?.estoque || {};
    pedidos = data.record?.pedidos || [];
  } catch(e) {
    console.error('Erro ao carregar estoque:', e);
  }
}
iniciar();

// ── Helpers ───────────────────────────────────────────────────────────
function removeEmojis(str) {
  return str
    .replace(/[\u{1F1E0}-\u{1F1FF}]{2}/gu, '')
    .replace(/[\u{1F3F4}\u{1F3C1}\u{1F3C6}\u{1F30E}\u{1F4DC}]/gu, '')
    .replace(/\uFE0F/g, '')
    .replace(/[\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0073}\u{E007F}]/gu, '')
    .trim();
}

function parseLinhaF1(linha) {
  const s = removeEmojis(linha);
  const idx = s.indexOf('=');
  if (idx === -1) return null;
  const pais = s.slice(0, idx).trim().toUpperCase().replace(/\s+/g,'');
  const nums = {};
  for (let p of s.slice(idx+1).split(',')) {
    p = p.trim();
    const m = p.match(/^(\d+)(\(\d+x\))?$/i);
    if (m) nums[m[1]] = 1;
  }
  return Object.keys(nums).length ? { pais, nums } : null;
}

function parseLinhaF2(linha) {
  const s = removeEmojis(linha);
  const idx = s.indexOf(':');
  if (idx === -1) return null;
  const pais = s.slice(0, idx).trim().toUpperCase().replace(/\s+/g,'');
  const nums = {};
  for (let p of s.slice(idx+1).split(',')) {
    p = p.trim();
    if (/^\d+$/.test(p)) nums[p] = 1;
  }
  return Object.keys(nums).length ? { pais, nums } : null;
}

// ── Dicionário de nomes → código ─────────────────────────────────────
const NOMES_PAISES = {

  'ALG':'ALG','ALGERIA':'ALG','ARGELIA':'ALG','ALEGRIA':'ALG','ALGE':'ALG',

  'AUS':'AUS','AUSTRALIA':'ALG','AUST':'AUS','AUSTRALI':'AUS',

  'AUT':'AUT','AUSTRIA':'AUT','AUST':'AUT',

  'BEL':'BEL','BELGICA':'BEL','BELGIUM':'BEL','BELG':'BEL',

  'EGY':'EGY','EGITO':'EGY','EGYPT':'EGY','EGI':'EGY',

  'ENG':'ENG','INGLATERRA':'ENG','ENGLAND':'ENG','INGL':'ENG',

  'FRA':'FRA','FRANCA':'FRA','FRANCE':'FRA','FRANC':'FRA',

  'HAI':'HAI','HAITI':'HAI','HAIT':'HAI','HAIT':'HAI',

  'IRN':'IRN','IRA':'IRN','IRAN':'IRN',

  'IRQ':'IRQ','IRAQUE':'IRQ','IRAQ':'IRQ',

  'JOR':'JOR','JORDANIA':'JOR','JORDAN':'JOR','JOR':'JOR',
  // Japão
  'JPN':'JPN','JAPAO':'JPN','JAPAN':'JPN','JAP':'JPN',
  // Coreia
  'KOR':'KOR','COREIA':'KOR','KOREA':'KOR','COR':'KOR',
  // Arábia Saudita
  'KSA':'KSA','ARABIA':'KSA','SAUDITA':'KSA','SAUDI':'KSA','ARAB':'KSA',

  'MAR':'MAR','MARROCOS':'MAR','MOROCCO':'MAR','MARR':'MAR',

  'NOR':'NOR','NORUEGA':'NOR','NORWAY':'NOR','NORU':'NOR',

  'QAT':'QAT','CATAR':'QAT','QATAR':'QAT','CAT':'QAT',

  'RSA':'RSA','AFRICADOSUL':'RSA','SOUTHAFRICA':'RSA','AFRICA':'RSA',

  'SCO':'SCO','ESCOCIA':'SCO','SCOTLAND':'SCO','ESCO':'SCO',

  'SEN':'SEN','SENEGAL':'SEN','SENE':'SEN',

  'SUI':'SUI','SUICA':'SUI','SWITZERLAND':'SUI','SUI':'SUI',

  'SWE':'SWE','SUECIA':'SWE','SWEDEN':'SWE','SUE':'SWE',

  'TUN':'TUN','TUNISIA':'TUN','TUNIS':'TUN','TUN':'TUN',

  'TUR':'TUR','TURQUIA':'TUR','TURKEY':'TUR','TURQ':'TUR',

  'URU':'URU','URUGUAI':'URU','URUGUAY':'URU','URUG':'URU',

  'USA':'USA','EUA':'USA','ESTADOSUNIDOS':'USA','UNITED':'USA',
  // Uzbequistão
  'UZB':'UZB','UZBEQUISTAO':'UZB','UZBEKISTAN':'UZB','UZB':'UZB',
  // Coca-Cola / FWC
  'CC':'CC','COCA':'CC','COCACOLA':'CC','COCAL':'CC',
  'FWC':'FWC','TROFEU':'FWC','COPA':'FWC',
};

function normalizarPais(raw) {
  // Remove espaços, pontos, acentos e coloca maiúsculo
  const limpo = raw.trim()
    .toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove acentos
    .replace(/[^A-Z]/g, ''); // só letras
  return NOMES_PAISES[limpo] || limpo;
}

// ── Parser formato livre (ex: "Paraguai. 1,4" ou "CZE. 12,16") ────────
function parseFormatoLivre(texto) {
  const resultado = {};
  const linhas = texto.split('\n');
  for (const linha of linhas) {
    const t = linha.trim();
    if (!t) continue;
    // Tenta separar país de números por ".", ":", "=" ou espaço
    const m = t.match(/^([A-Za-zÀ-ú\s]{2,20})[\.:\=\s]+(.+)$/);
    if (!m) continue;
    const paisRaw = m[1].trim();
    const numStr = m[2].trim();
    // Extrai números
    const nums = {};
    for (const n of numStr.match(/\d+/g) || []) {
      nums[n] = 1;
    }
    if (Object.keys(nums).length === 0) continue;
    const pais = normalizarPais(paisRaw);
    if (!pais || pais.length < 2) continue;
    if (!resultado[pais]) resultado[pais] = {};
    Object.assign(resultado[pais], nums);
  }
  return resultado;
}

function parseLista(texto) {
  const resultado = {};

  // Formato livre: "Paraguai. 1,4" / "CZE. 12,16" / "Alegria.6"
  const livre = parseFormatoLivre(texto);
  for (const [pais, nums] of Object.entries(livre)) {
    if (!resultado[pais]) resultado[pais] = {};
    Object.assign(resultado[pais], nums);
  }

  // Formato inline: CZE3, BRA17
  const linhasInline = texto.split('\n').filter(l => /\b[A-Z]{2,4}\d+\b/.test(l.trim()) && !/:/.test(l) && !l.includes('='));
  if (linhasInline.length > 0) {
    for (const m of linhasInline.join(' ').matchAll(/\b([A-Z]{2,4})(\d+)\b/g)) {
      if (['PG','ID','V'].includes(m[1])) continue;
      const pais = normalizarPais(m[1]);
      if (!resultado[pais]) resultado[pais] = {};
      resultado[pais][m[2]] = 1;
    }
  }

  // Formato com "=" ou ":"
  for (const linha of texto.split('\n')) {
    const t = linha.trim();
    if (!t || /^https?:\/\//i.test(t) || /faltantes|baixe|copa 2026|vamos trocar|gerado|android|ios|chave/i.test(t) || !/[:=]/.test(t)) continue;
    const p = linha.includes('=') ? parseLinhaF1(linha) : parseLinhaF2(linha);
    if (p) {
      const pais = normalizarPais(p.pais);
      if (resultado[pais]) Object.assign(resultado[pais], p.nums);
      else resultado[pais] = p.nums;
    }
  }

  return resultado;
}

function isBrilhante(n) { return n === '1'; }
function formatBRL(v) { return 'R$ ' + v.toFixed(2).replace('.',','); }

function disponivelPara(pais, num) {
  const total = estoque[pais]?.[num] || 0;
  let reservado = 0;
  for (const p of pedidos) {
    if (p.status === 'reservado' && p.matches?.[pais]?.includes(num)) reservado++;
  }
  return total - reservado > 0;
}

// ── Verificar ─────────────────────────────────────────────────────────
async function verificar() {
  const nome = document.getElementById('nome-cliente').value.trim();
  const txt = document.getElementById('lista-cliente').value;
  const div = document.getElementById('resultado');

  if (!nome) { div.innerHTML = `<div class="alerta alerta-erro">⚠️ Coloca seu nome primeiro!</div>`; return; }
  if (!txt.trim()) { div.innerHTML = `<div class="alerta alerta-erro">⚠️ Cola sua lista de figurinhas!</div>`; return; }

  div.innerHTML = `<div class="loading"><div class="spinner"></div><br>Verificando estoque...</div>`;

  // Recarrega estoque atualizado
  try {
    const r = await fetch(BIN_URL + '/latest', { headers: DB_HEADERS });
    const data = await r.json();
    estoque = data.record?.estoque || {};
    pedidos = data.record?.pedidos || [];
  } catch(e) {}

  if (Object.keys(estoque).length === 0) {
    div.innerHTML = `<div class="alerta alerta-erro">⚠️ Estoque indisponível no momento. Tenta mais tarde!</div>`;
    return;
  }

  const pedidas = parseLista(txt);
  if (Object.keys(pedidas).length === 0) {
    div.innerHTML = `<div class="alerta alerta-erro">⚠️ Não consegui ler sua lista. Tenta copiar direto do app.</div>`;
    return;
  }

  const matches = {}, faltam = {};
  for (const [pais, nums] of Object.entries(pedidas)) {
    for (const num of Object.keys(nums)) {
      if (disponivelPara(pais, num)) {
        if (!matches[pais]) matches[pais] = [];
        matches[pais].push(num);
      } else {
        if (!faltam[pais]) faltam[pais] = [];
        faltam[pais].push(num);
      }
    }
  }

  const totalMatch = Object.values(matches).reduce((s,a)=>s+a.length,0);
  const totalPediu = Object.values(pedidas).reduce((s,a)=>s+Object.keys(a).length,0);

  if (totalMatch === 0) {
    div.innerHTML = `<div class="alerta alerta-erro">😕 Poxa, nenhuma das ${totalPediu} figurinhas que você precisa está disponível agora. Tenta mais tarde!</div>`;
    return;
  }

  let normais = 0, brilhantes = 0;
  for (const nums of Object.values(matches))
    for (const n of nums)
      isBrilhante(n) ? brilhantes++ : normais++;
  const total = normais * 1.50 + brilhantes * 3.00;

  const linhasMsg = Object.entries(matches).sort().map(([pais, nums]) =>
    `${pais}: ${nums.sort((a,b)=>parseInt(a)-parseInt(b)).join(', ')}`
  );
  const msgWhats = encodeURIComponent(
    `Olá! Sou ${nome} e tenho interesse nas seguintes figurinhas:\n\n` +
    linhasMsg.join('\n') +
    `\n\n💰 Total: ${formatBRL(total)}` +
    (normais > 0 ? `\n• ${normais} normal${normais!==1?'is':''} × R$ 1,50` : '') +
    (brilhantes > 0 ? `\n• ${brilhantes} brilhante${brilhantes!==1?'s':''} ✨ × R$ 3,00` : '') +
    `\n\nPodemos fechar? 😊`
  );

  div.innerHTML = `
    <div class="resultado-box">
      <div class="count-num">${totalMatch}</div>
      <div class="count-label">figurinhas disponíveis das ${totalPediu} que você precisa</div>

      ${Object.entries(matches).sort().map(([pais, nums]) => `
        <div class="pais-bloco">
          <div class="pais-titulo">${pais}</div>
          ${nums.sort((a,b)=>parseInt(a)-parseInt(b)).map(n =>
            `<span class="figurinha-tag ${isBrilhante(n)?'brilhante':''}">${pais}-${n}${isBrilhante(n)?' ✨':''}</span>`
          ).join('')}
        </div>
      `).join('')}

      <div class="separador"></div>
      <div class="resumo-preco">
        ${normais > 0 ? `<div class="preco-linha"><span>${normais}x normal${normais!==1?'is':''}</span><span>${formatBRL(normais*1.50)}</span></div>` : ''}
        ${brilhantes > 0 ? `<div class="preco-linha"><span>${brilhantes}x brilhante${brilhantes!==1?'s':''} ✨</span><span>${formatBRL(brilhantes*3.00)}</span></div>` : ''}
        <div class="preco-total"><span>Total</span><span>${formatBRL(total)}</span></div>
      </div>

      ${Object.keys(faltam).length > 0 ? `
        <div class="separador"></div>
        <details>
          <summary style="font-size:0.78rem;color:var(--muted);cursor:pointer;">Ver ${Object.values(faltam).reduce((s,a)=>s+a.length,0)} que não temos</summary>
          <div style="margin-top:8px;">
            ${Object.entries(faltam).sort().map(([pais, nums]) => `
              <div class="pais-bloco">
                <div class="pais-titulo" style="color:#4b5a72">${pais}</div>
                ${nums.map(n=>`<span class="figurinha-tag" style="background:#0d1929;border-color:var(--borda);color:var(--muted);">${pais}-${n}</span>`).join('')}
              </div>
            `).join('')}
          </div>
        </details>
      ` : ''}

      <a class="btn-whats" href="https://wa.me/5534984453542?text=${encodeURIComponent(
        `Olá! Sou ${nome} e tenho interesse nas seguintes figurinhas:\n\n` +
        linhasMsg.join('\n') +
        `\n\n💰 Total: ${formatBRL(total)}` +
        (normais > 0 ? `\n• ${normais} normal${normais!==1?'is':''} × R$ 1,50` : '') +
        (brilhantes > 0 ? `\n• ${brilhantes} brilhante${brilhantes!==1?'s':''} ✨ × R$ 3,00` : '') +
